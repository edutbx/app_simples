name: CI - app_simpless

on: 
  push:
    branches: [ main ]

jobs:

 build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}
 
      - name: Build com Docker Compose
        run: docker compose build
 
      - name: Push com Docker Compose
        run: docker compose push

deploy:
  needs: build
  runs-on: ubuntu-latest
  steps:
    - name: Deploy via SSH (Appleboy)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script: |
          # Entra na home do usuário
          cd ~
          # Se o projeto não existe, clone. Se existe, pull.
          if [ ! -d "edutbx-app" ]; then
            git clone hhtps://github.com/${{ github.repositoy }} edutbx-app
          fi
          cd edutbx-app
          git pull origin main
          docker compose pull
          docker compose up -d