services:
  db:
    image: postgres:15-alpine
    container_name: edutbx_db
    environment:
      POSTGRES_USER: fatec_user
      POSTGRES_PASSWORD: fatec_password
      POSTGRES_DB: todolist
    volumes:
      - edutbx_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: edutbx_api
    restart: always  # <-- Se a API cair, o Docker sobe ela de novo até o banco estar pronto.
    environment:
      DB_HOST: db
    depends_on:
      - db
    ports:
      - "3014:3000"

  web:
    build: ./frontend
    container_name: edutbx_web
    ports:
      - "8014:80"
    depends_on:
      - api

volumes:
  edutbx_data: